<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src vscode-webview: data:; style-src {{cspSource}} 'unsafe-inline'; font-src {{cspSource}}; script-src 'nonce-{{nonce}}' 'unsafe-eval';"
    />
    <title>{{title}}</title>
    <link href="{{styleUri}}" rel="stylesheet" />
  </head>
  <body>
    <div class="a2ui-surface" id="surface-{{surfaceId}}">
      {{diagnosticsHtml}}
      {{surfaceHtml}}
      {{streamingIndicatorHtml}}
    </div>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
  </body>
</html>
